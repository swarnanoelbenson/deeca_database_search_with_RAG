services:
  - type: web
    name: deeca-data-discovery
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.gradio_app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MODEL
        value: claude-sonnet-5
      - key: DEBUG
        value: "false"
